    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        outline: 0;
      }
      body {
        height: 2000px;
      }

      .modal .modal-dialog {
        transition: top 0.4s ease;
        position: absolute;
        left: 0;
        right: 0;
        top: -100%;
        z-index: 999;
        background-color: #fff;
        max-width: 80%;
        margin: 0 auto;
        border: 1px solid #ddd;
        padding: 20px;
      }
      .modal.show .modal-dialog {
        top: 10%;
      }
      .modal .modal-dialog .modal-heading {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
      }
      .modal .modal-dialog .close-btn {
        display: block;
        font-size: 20px;
        margin-left: auto;
        cursor: pointer;
      }
      .modal .modal-overlay {
        position: absolute;
        inset: 0;
        background-color: #00000076;
        opacity: 0;
        visibility: hidden;
        transition: 0.4s ease;
        transition-property: opacity, visibility;
      }
      .modal.show .modal-overlay {
        opacity: 1;
        visibility: visible;
      }
    </style>
  </head>
