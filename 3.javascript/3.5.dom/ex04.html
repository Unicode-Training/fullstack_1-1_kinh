    <style>
      .box {
        border: 1px solid red;
        padding: 10px;
        margin: 10px 0;
      }
      .content {
        border: 1px solid green;
        padding: 10px;
      }
      .active {
        color: red;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      a {
        text-decoration: none;
        color: #fff;
      }
      .menu {
        width: 300px;
        margin: 30px auto;
        background: #333;
      }
      .menu li a {
        display: block;
        padding: 10px;
      }
      .menu ul {
        display: none;
        background: green;
      }
      .menu li.has-children > a {
        display: flex;
        justify-content: space-between;
      }
      .menu li.has-children > a::after {
        content: "▼";
      }
      .menu li.open.has-children ul {
        display: block;
      }
      .menu li.has-children.open > a::after {
        rotate: 180deg;
      }
    </style>
  </head>
