<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="max-w-[80%] mx-auto py-3">
      <h2 class="text-3xl mb-3 text-center">Sản phẩm</h2>
      <form class="mb-3">
        <div class="mb-3">
          <label class="block mb-1">Name</label>
          <input
            name="title"
            type="text"
            placeholder="Name..."
            class="px-3 py-1 border border-[#ddd] outline-none w-full"
          />
        </div>
        <div class="mb-3">
          <label class="block mb-1">Price</label>
          <input
            name="price"
            type="number"
            placeholder="Price..."
            class="px-3 py-1 border border-[#ddd] outline-none w-full"
          />
        </div>
        <div class="mb-3">
          <label class="block mb-1">Mô tả</label>
          <textarea
            name="description"
            placeholder="Description..."
            class="px-3 py-1 border border-[#ddd] outline-none w-full"
          ></textarea>
        </div>
        <button
          class="px-3 py-1 bg-green-600 text-white block disabled:bg-green-300"
        >
          Lưu thay đổi
        </button>
        <span class="js-msg block text-red-600"></span>
      </form>
      <div class="js-product-list flex flex-wrap -mx-3"></div>
    </div>
    <script src="js/ex01.js"></script>
  </body>
</html>
